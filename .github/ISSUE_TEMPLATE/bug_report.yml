name: Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Numbered steps work best.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.1, Ubuntu 24.04, Windows 11
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime / browser
      placeholder: Node 22.10, Python 3.13, Chrome 132
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Project version or commit
      placeholder: v1.2.3 or commit sha
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us debug.
    validations:
      required: false
